services:
  - type: web
    name: nursphere-api
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        value: nursphere_jwt_secret_key_2026_opay_challenge
      - key: PORT
        value: 5000
